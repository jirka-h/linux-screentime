<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #d4b42a;
    --text: #e8eaf0;
    --grid: rgba(79,255,176,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 12px 24px;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .header-left h1 span { color: var(--accent); }
  .header-left p { color: var(--text); font-size: 0.85rem; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  .load-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }

  .load-section label {
    font-size: 0.86rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .file-btn {
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .file-btn:hover { background: var(--accent); color: var(--bg); }

  #fileInput { display: none; }

  /* Today card */
  .card.today-card {
    padding: 28px 32px;
    flex-direction: row;
    align-items: center;
    gap: 40px;
    position: relative;
    overflow: hidden;
  }
  .today-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .today-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .today-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 300;
    letter-spacing: 0;
    word-spacing: -0.2em;
    color: var(--accent);
    line-height: 1;
  }

  .today-date {
    font-size: 0.9rem;
    color: var(--text);
    margin-top: 6px;
  }

  .today-sessions {
    border-left: 1px solid var(--border);
    padding-left: 40px;
  }

  .today-sessions .sess-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .session-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .session-item {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
  }

  .session-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .session-range { color: var(--text); }
  .session-dur { color: var(--text); }

  /* Grid */
  .grid-2x2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 700px) { .grid-2x2 { grid-template-columns: 1fr; } }

  /* Week rows */
  .week-rows { display: flex; flex-direction: column; gap: 8px; }

  .week-row { display: flex; flex-direction: column; gap: 4px; }

  .week-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
  }
  .week-name { color: var(--text); }
  .week-stats { color: var(--accent); }

  .week-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .week-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(.16,1,.3,1);
  }

  .week-detail {
    display: flex;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    flex-wrap: wrap;
  }
  .week-detail b { color: var(--accent); font-weight: 400; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Bar chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    min-height: 120px;
    flex: 1;
  }

  .bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
  }

  .bar-area {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
  }

  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    transition: height 0.6s cubic-bezier(.16,1,.3,1);
    position: relative;
    cursor: pointer;
  }
  .bar:hover { filter: brightness(1.3); }


  .bar-value {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    text-align: center;
    white-space: nowrap;
  }

  .bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    text-align: center;
  }

  /* Monthly stats */
  .month-rows { display: flex; flex-direction: column; gap: 14px; }

  .month-row { display: flex; flex-direction: column; gap: 6px; }

  .month-detail {
    display: flex;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    color: var(--text);
    flex-wrap: wrap;
  }
  .month-detail b { color: var(--accent); font-weight: 400; }

  .month-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.86rem;
  }
  .month-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .month-stats { font-family: 'JetBrains Mono', monospace; font-size: 0.86rem; color: var(--text); }

  .month-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .month-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(.16,1,.3,1);
  }

  /* Status */
  #status {
    text-align: center;
    padding: 60px 20px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.8;
  }

  #status .hint {
    margin-top: 16px;
    font-size: 0.86rem;
    color: var(--text);
    border: 1px dashed var(--border);
    display: inline-block;
    padding: 12px 20px;
    border-radius: 6px;
  }
  #status .hint code {
    color: var(--accent);
    background: rgba(79,255,176,0.08);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .hidden { display: none !important; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Screen<span>Time</span> <span id="versionLabel" style="font-size:0.5em;color:var(--text)"></span></h1>
    <p id="csvMeta" style="visibility:hidden">·</p>
  </div>
  <div class="load-section">
    <label>Load CSV from tracker</label>
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">
      📂 Open screentime CSV
    </button>
    <input type="file" id="fileInput" accept=".csv" onchange="handleFile(event)">
  </div>
</header>

<div id="status">
  No data loaded yet.<br>
  <div class="hint">
    Run on the PC you want to monitor:<br><br>
    <code>bash screentime-tracker.sh --rebuild</code><br><br>
    Then click <strong>Open screentime CSV</strong> above<br>
    and select the generated <code>screentime-log.csv</code>.
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="grid-2x2">
    <div class="card today-card">
      <div>
        <div class="today-label">Today's active time</div>
        <div class="today-time" id="todayTime">0h 00m</div>
        <div class="today-date" id="todayDate"></div>
      </div>
      <div class="today-sessions">
        <div class="sess-label">Sessions today</div>
        <div class="session-list" id="sessionList"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Last 7 days</div>
      <div class="bar-chart" id="weekChart"></div>
    </div>
    <div class="card">
      <div class="card-title">Complete weeks (Mon–Sun)</div>
      <div class="week-rows" id="weekStats"></div>
    </div>
    <div class="card">
      <div class="card-title">Monthly statistics</div>
      <div class="month-rows" id="monthStats"></div>
    </div>
  </div>
</div>

<script>
// ── Utility ──────────────────────────────────────────────────────
function fmtDur(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  let hostname = '';
  let collected = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    // Metadata lines: # hostname:p1gen7  or  # collected:2026-04-19 14:32:00
    if (line.startsWith('#')) {
      const m = line.match(/^#\s*(\w+):\s*(.+)$/);
      if (m && m[1] === 'hostname')  hostname  = m[2].trim();
      if (m && m[1] === 'collected') collected = m[2].trim();
      continue;
    }
    // Skip header row
    if (line.startsWith('date,')) continue;
    const parts = line.split(',');
    if (parts.length < 4) continue;
    const date = parts[0].trim();
    const wake = parts[1].trim();
    const dur  = parseInt(parts[3]) || 0;
    const type = (parts[4] || 'wake').trim();
    if (date && wake && dur > 0) rows.push({ date, wake, dur, type });
  }
  return { rows, hostname, collected };
}

// Split sessions across midnight, return map of dateStr -> seconds
function buildDayTotals(rows) {
  const totals = {};
  const sleepTotals = {};
  const sessionsByDay = {};
  const sleepSessionsByDay = {};

  for (const r of rows) {
    const wakeDt = new Date(`${r.date}T${r.wake}`);
    if (isNaN(wakeDt)) continue;

    const rowType = r.type || 'wake';
    const targetTotals = rowType === 'wake' ? totals : sleepTotals;
    const targetSessions = rowType === 'wake' ? sessionsByDay : sleepSessionsByDay;

    // Compute end datetime as start + duration (always reliable)
    const endDt = new Date(wakeDt.getTime() + r.dur * 1000);

    // Split across days using timestamps (ms), no object mutation
    const wakeMs = wakeDt.getTime();
    const endMs = endDt.getTime();

    // Find the starting day (midnight of wake day)
    const wakeMidnight = new Date(`${r.date}T00:00:00`).getTime();

    // Iterate over days: day 0, 1, 2, ... until we pass endMs
    for (let dayOffset = 0; dayOffset < 60; dayOffset++) {
      const dayStartMs = wakeMidnight + dayOffset * 86400000;
      const dayEndMs   = dayStartMs + 86400000;

      if (dayStartMs >= endMs) break; // past the end of session

      const segStart = Math.max(wakeMs, dayStartMs);
      const segEnd   = Math.min(endMs, dayEndMs);
      const secs = Math.round((segEnd - segStart) / 1000);

      if (secs <= 0) continue;

      // Get date string for this day
      const dayStr = new Date(dayStartMs + 43200000).toISOString().slice(0, 10); // +12h to avoid DST edge

      targetTotals[dayStr] = (targetTotals[dayStr] || 0) + secs;
      if (!targetSessions[dayStr]) targetSessions[dayStr] = [];
      targetSessions[dayStr].push({
        wake:  new Date(segStart).toTimeString().slice(0, 8),
        sleep: new Date(segEnd).toTimeString().slice(0, 8),
        dur:   secs
      });
    }
  }
  return { totals, sleepTotals, sessionsByDay, sleepSessionsByDay };
}

// ── Render ────────────────────────────────────────────────────────
function render({ rows, hostname, collected, generated, version }) {
  const td = todayStr();
  const { totals, sleepTotals, sessionsByDay, sleepSessionsByDay } = buildDayTotals(rows);

  // Version
  if (version) document.getElementById('versionLabel').textContent = `v${version}`;

  // Update header meta
  const metaEl = document.getElementById('csvMeta');
  const now = new Date();
  const gen = generated || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${now.toTimeString().slice(0,8)}`;
  const parts = [];
  if (hostname)  parts.push(hostname);
  if (collected) parts.push(`<span style="color:var(--accent)">data collected</span> ${collected}`);
  parts.push(`<span style="color:var(--accent)">report generated</span> ${gen}`);
  metaEl.innerHTML = parts.join(' &middot; ');
  metaEl.style.visibility = 'visible';

  // Today
  const todaySecs = totals[td] || 0;
  document.getElementById('todayTime').textContent = fmtDur(todaySecs);
  document.getElementById('todayDate').textContent = new Date(td + 'T12:00:00').toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  const todaySess = sessionsByDay[td] || [];
  const todaySleepSess = sleepSessionsByDay[td] || [];
  let sessHtml = todaySess.length
    ? todaySess.map(s => `
        <div class="session-item">
          <div class="session-dot"></div>
          <span class="session-range">${s.wake} – ${s.sleep}</span>
          <span class="session-dur">${fmtDur(s.dur)}</span>
        </div>`).join('')
    : '<span style="color:var(--text);font-size:0.86rem;font-family:\'JetBrains Mono\',monospace">No sessions yet today</span>';
  if (todaySleepSess.length) {
    sessHtml += `<div style="margin-top:10px;font-size:0.86rem;color:var(--text);text-transform:uppercase;letter-spacing:0.1em">Sleep today — ${fmtDur(sleepTotals[td] || 0)}</div>`;
    sessHtml += todaySleepSess.map(s => `
        <div class="session-item">
          <div class="session-dot" style="background:var(--accent2)"></div>
          <span class="session-range">${s.wake} – ${s.sleep}</span>
          <span class="session-dur">${fmtDur(s.dur)}</span>
        </div>`).join('');
  }
  document.getElementById('sessionList').innerHTML = sessHtml;

  // Week chart
  const weekDates = Array.from({length:7}, (_,i) => addDays(td, i-6));
  const weekSecs = weekDates.map(d => totals[d] || 0);
  const maxWeek = Math.max(...weekSecs, 1);

  const weekHtml = weekDates.map((d, i) => {
    const secs = weekSecs[i];
    const pct = Math.max((secs / maxWeek) * 100, secs > 0 ? 4 : 1);
    const isToday = d === td;
    const isSunday = new Date(d+'T12:00:00').getDay() === 0;
    const label = isToday ? 'today' : new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short'}).slice(0,2);
    const color = isToday ? 'var(--accent)' : isSunday ? 'var(--accent2)' : 'var(--accent3)';
    return `
      <div class="bar-wrap">
        <div class="bar-area">
          <div class="bar" style="height:${pct}%;background:${color};opacity:${secs>0?1:0.15}">
            <div class="bar-value" style="color:${isToday?'var(--accent)':'var(--text)'}">${fmtDur(secs)}</div>
          </div>
        </div>
        <div class="bar-label" style="color:${isToday?'var(--accent)':'var(--text)'}">${label}</div>
      </div>`;
  }).join('');
  document.getElementById('weekChart').innerHTML = weekHtml;

  // Complete weeks (Mon–Sun)
  const tdObj = new Date(td + 'T12:00:00');
  let cutoffM = tdObj.getMonth() - 2;
  let cutoffY = tdObj.getFullYear();
  if (cutoffM < 1) { cutoffM += 12; cutoffY--; }
  const cutoff = `${cutoffY}-${String(cutoffM).padStart(2,'0')}-01`;
  let lastSunday = new Date(tdObj);
  lastSunday.setDate(lastSunday.getDate() - tdObj.getDay());
  if (tdObj.getDay() === 0) lastSunday.setDate(lastSunday.getDate() - 7);

  const weeks = [];
  let wEnd = new Date(lastSunday);
  while (true) {
    const wStart = new Date(wEnd);
    wStart.setDate(wStart.getDate() - 6);
    if (wStart < new Date(cutoff + 'T00:00:00')) break;
    const wStartStr = wStart.toISOString().slice(0,10);
    const wEndStr = wEnd.toISOString().slice(0,10);
    let wTotal = 0;
    const daySecs = [];
    for (let di = 0; di < 7; di++) {
      const dd = new Date(wStart);
      dd.setDate(dd.getDate() + di);
      const ds = dd.toISOString().slice(0,10);
      const s = totals[ds] || 0;
      wTotal += s;
      daySecs.push(s);
    }
    const activeSecs = daySecs.filter(s => s > 0).sort((a,b) => a-b);
    const ac = activeSecs.length;
    const avg = Math.round(wTotal / Math.max(ac, 1));
    const mn = ac ? activeSecs[0] : 0;
    const mx = ac ? activeSecs[ac-1] : 0;
    const mid = Math.floor(ac / 2);
    const median = ac % 2 ? activeSecs[mid] : ac ? Math.round((activeSecs[mid-1] + activeSecs[mid]) / 2) : 0;
    weeks.push({ wStart, wEnd: new Date(wEnd), wTotal, ac, avg, mn, mx, median });
    const prev = new Date(wStart);
    prev.setDate(prev.getDate() - 1);
    wEnd = prev;
  }

  const weekTotals = weeks.map(w => w.wTotal);
  const ranked = [...new Set(weekTotals)].sort((a,b) => a-b);
  const bot3 = new Set(ranked.slice(0, 3));
  const top3 = new Set(ranked.slice(-3));
  const maxWeekTotal = Math.max(...weekTotals, 1);

  const weekStatsHtml = weeks.map(w => {
    const label = `${w.wStart.getDate()}.${w.wStart.getMonth()+1}. – ${w.wEnd.getDate()}.${w.wEnd.getMonth()+1}.`;
    const pct = (w.wTotal / maxWeekTotal) * 100;
    const color = top3.has(w.wTotal) ? 'var(--accent2)' : bot3.has(w.wTotal) ? 'var(--accent)' : 'var(--accent3)';
    return `
      <div class="week-row">
        <div class="week-meta">
          <span class="week-name">${label}</span>
          <span class="week-stats">${w.ac}/7 days</span>
        </div>
        <div class="week-bar-bg">
          <div class="week-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="week-detail">
          <span>total <b>${fmtDur(w.wTotal)}</b></span>
          <span>avg <b>${fmtDur(w.avg)}</b></span>
          <span>min <b>${fmtDur(w.mn)}</b></span>
          <span>med <b>${fmtDur(w.median)}</b></span>
          <span>max <b>${fmtDur(w.mx)}</b></span>
        </div>
      </div>`;
  }).join('');
  document.getElementById('weekStats').innerHTML = weekStatsHtml || '<span style="color:var(--text);font-size:0.75rem">No complete weeks yet</span>';

  // Monthly stats (last 3 months)
  const monthMap = {};
  for (const [d, secs] of Object.entries(totals)) {
    if (d < cutoff) continue;
    const ym = d.slice(0,7);
    if (!monthMap[ym]) monthMap[ym] = { total: 0, activeDays: [] };
    monthMap[ym].total += secs;
